}

let currentLevel, currentQuestion, askedQuestionIds = [], currentStreak = 0, bestStreak = 0, totalAnswered = 0;
let speechRate = 1.0, synth = window.speechSynthesis, voices = [], includeDetailNumbers = false, isAnswered = false;
const settingsArea = document.getElementById('settingsArea'), difficultySelect = document.getElementById('difficultySelect');
const questionArea = document.getElementById('questionArea'), questionNumber = document.getElementById('questionNumber');
const questionText = document.getElementById('questionText'), choicesDiv = document.getElementById('choices');
const repeatBtn = document.getElementById('repeatBtn'), backBtn = document.getElementById('backBtn');
const speedSlider = document.getElementById('speedSlider'), speedValue = document.getElementById('speedValue');
const explanationDiv = document.getElementById('explanation'), explanationText = document.getElementById('explanationText');
const errorMessage = document.getElementById('errorMessage'), currentStreakDisplay = document.getElementById('currentStreak');
const bestStreakDisplay = document.getElementById('bestStreak'), totalAnsweredDisplay = document.getElementById('totalAnswered');
const detailNumbersCheckbox = document.getElementById('detailNumbersCheckbox');

function init() {
    if (!('speechSynthesis' in window)) {
        errorMessage.textContent = 'Your browser does not support Web Speech API. Please use Chrome, Edge, or Safari.';
        errorMessage.style.display = 'block';
        return;
    }
    loadVoices();
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
    loadStats();
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', () => selectDifficulty(btn.dataset.level));
    });
    repeatBtn.addEventListener('click', repeatAudio);
    backBtn.addEventListener('click', backToDifficulty);
    speedSlider.addEventListener('input', (e) => {
        speechRate = parseFloat(e.target.value);
        speedValue.textContent = speechRate.toFixed(1);
    });
    detailNumbersCheckbox.addEventListener('change', (e) => {
        includeDetailNumbers = e.target.checked;
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') {
            if (!repeatBtn.disabled) repeatAudio();
        } else if (e.key >= '1' && e.key <= '4') {
            const choices = document.querySelectorAll('.choice-btn');
            if (choices[parseInt(e.key) - 1] && !choices[parseInt(e.key) - 1].disabled) {
                choices[parseInt(e.key) - 1].click();
            }
        }
    });
    difficultySelect.style.display = 'flex';
}

function loadVoices() { voices = synth.getVoices(); }
function loadStats() {
    bestStreak = parseInt(localStorage.getItem('bestStreak') || '0');
    bestStreakDisplay.textContent = bestStreak;
}
function saveStats() { localStorage.setItem('bestStreak', bestStreak); }
function getNextQuestion(level) {
    let pool = questions[level];
    if (!includeDetailNumbers) pool = pool.filter(q => !q.detailNumbers);
    pool = pool.filter(q => !askedQuestionIds.includes(q.id));
    if (pool.length === 0) {
        askedQuestionIds = [];
        pool = questions[level];
        if (!includeDetailNumbers) pool = pool.filter(q => !q.detailNumbers);
    }
    const question = pool[Math.floor(Math.random() * pool.length)];
    askedQuestionIds.push(question.id);
    return question;
}
function selectDifficulty(level) {
    currentLevel = level;
    askedQuestionIds = [];
    currentStreak = 0;
    totalAnswered = 0;
    updateStreak();
    updateTotalAnswered();
    if (level === 'beginner') speechRate = 0.8;
    else if (level === 'intermediate') speechRate = 1.0;
    else speechRate = 1.2;
    speedSlider.value = speechRate;
    speedValue.textContent = speechRate.toFixed(1);
    settingsArea.style.display = 'none';
    difficultySelect.style.display = 'none';
    questionArea.style.display = 'block';
    loadQuestion();
}
function loadQuestion() {
    currentQuestion = getNextQuestion(currentLevel);
    isAnswered = false;
    questionNumber.textContent = `Question #${totalAnswered + 1}`;
    questionText.textContent = 'Get ready...';
    explanationDiv.classList.remove('show');
    const shuffledChoices = [...currentQuestion.choices].sort(() => Math.random() - 0.5);
    choicesDiv.innerHTML = '';
    shuffledChoices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice;
        btn.addEventListener('click', () => checkAnswer(choice, btn));
        choicesDiv.appendChild(btn);
    });
    document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
    repeatBtn.disabled = true;
    setTimeout(() => { playAudio(); }, 1000);
}
function playAudio() {
    if (!currentQuestion) return;
    const utterance = new SpeechSynthesisUtterance(currentQuestion.text);
    utterance.lang = 'en-US';
    utterance.rate = speechRate;
    const enVoice = voices.find(v => v.lang.includes('en-US') || v.lang.includes('en'));
    if (enVoice) utterance.voice = enVoice;
    utterance.onstart = () => {
        repeatBtn.disabled = true;
        questionText.textContent = '🔊 Listening...';
    };
    utterance.onend = () => {
        repeatBtn.disabled = false;
        document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = false);
        questionText.textContent = 'Choose the correct answer:';
    };
    synth.speak(utterance);
}
function repeatAudio() {
    if (!currentQuestion || isAnswered) return;
    const utterance = new SpeechSynthesisUtterance(currentQuestion.text);
    utterance.lang = 'en-US';
    utterance.rate = speechRate;
    const enVoice = voices.find(v => v.lang.includes('en-US') || v.lang.includes('en'));
    if (enVoice) utterance.voice = enVoice;
    utterance.onstart = () => {
        repeatBtn.disabled = true;
        questionText.textContent = '🔊 Listening...';
    };
    utterance.onend = () => {
        repeatBtn.disabled = false;
        questionText.textContent = 'Choose the correct answer:';
    };
    synth.speak(utterance);
}
function checkAnswer(selected, btn) {
    if (isAnswered) return;
    isAnswered = true;
    totalAnswered++;
    updateTotalAnswered();
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    if (selected === currentQuestion.correct) {
        btn.classList.add('correct');
        currentStreak++;
        updateStreak();
        playCorrectSound();
        setTimeout(() => { loadQuestion(); }, 500);
    } else {
        btn.classList.add('incorrect');
        currentStreak = 0;
        updateStreak();
        document.querySelectorAll('.choice-btn').forEach(b => {
            if (b.textContent === currentQuestion.correct) b.classList.add('correct');
        });
        explanationText.textContent = currentQuestion.explanation;
        explanationDiv.classList.add('show');
        playIncorrectSound();
        setTimeout(() => { loadQuestion(); }, 2500);
    }
}
function updateStreak() {
    currentStreakDisplay.textContent = currentStreak;
    if (currentStreak > bestStreak) {
        bestStreak = currentStreak;
        bestStreakDisplay.textContent = bestStreak;
        saveStats();
    }
}
function updateTotalAnswered() { totalAnsweredDisplay.textContent = totalAnswered; }
function backToDifficulty() {
    questionArea.style.display = 'none';
    settingsArea.style.display = 'block';
    difficultySelect.style.display = 'flex';
    currentLevel = null;
    currentQuestion = null;
}
window.addEventListener('load', init);
    </script>
