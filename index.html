// Web Audio APIで正解音・不正解音を生成
const ctx = new (window.AudioContext || window.webkitAudioContext)();
function playCorrectSound() {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1047, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
}
function playIncorrectSound() {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
}

// Cookie操作用ヘルパー関数
function setCookie(name, value, days) {
    const maxAge = days * 24 * 60 * 60;
    document.cookie = `${name}=${value}; max-age=${maxAge}; path=/`;
}
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
}

// Japanese conversion function
function convertToJapanese(amountStr) {
    // Remove $ sign
    let str = amountStr.replace('$', '').trim();

    // Handle abbreviations (M, B, T)
    let multiplier = 1;
    if (str.endsWith('T')) {
        multiplier = 1000000000000;
        str = str.slice(0, -1);
    } else if (str.endsWith('B')) {
        multiplier = 1000000000;
        str = str.slice(0, -1);
    } else if (str.endsWith('M')) {
        multiplier = 1000000;
        str = str.slice(0, -1);
    }

    // Convert to number
    let num = parseFloat(str.replace(/,/g, '')) * multiplier;

    // Convert to Japanese units
    if (num >= 1000000000000) {
        // 兆 (trillion)
        let cho = Math.floor(num / 1000000000000);
        let remainder = num % 1000000000000;
        if (remainder >= 100000000) {
            let oku = Math.floor(remainder / 100000000);
            if (oku >= 1000) {
                let sen = Math.floor(oku / 1000);
                let hyaku = Math.floor((oku % 1000) / 100);
                if (hyaku > 0) {
                    return `${cho}兆${sen}千${hyaku}百億ドル`;
                } else {
                    return `${cho}兆${sen}千億ドル`;
                }
            } else {
                return `${cho}兆${oku}億ドル`;
            }
        } else {
            return `${cho}兆ドル`;
        }
    } else if (num >= 100000000) {
        // 億 (hundred million)
        let oku = Math.floor(num / 100000000);
        let remainder = num % 100000000;
        if (remainder >= 10000) {
            let man = Math.floor(remainder / 10000);
            if (man >= 1000) {
                let sen = Math.floor(man / 1000);
                let hyaku = Math.floor((man % 1000) / 100);
                if (hyaku > 0) {
                    return `${oku}億${sen}千${hyaku}百万ドル`;
                } else {
                    return `${oku}億${sen}千万ドル`;
                }
            } else {
                return `${oku}億${man}万ドル`;
            }
        } else {
            return `${oku}億ドル`;
        }
    } else if (num >= 10000) {
        // 万 (ten thousand)
        let man = Math.floor(num / 10000);
        let remainder = num % 10000;
        if (remainder >= 1000) {
            let sen = Math.floor(remainder / 1000);
            return `${man}万${sen}千ドル`;
        } else {
            return `${man}万ドル`;
        }
    } else {
        // Less than 10,000
        return `${num}ドル`;
    }
}

// Get max familiarity based on current streak
function getMaxFamiliarity(currentStreak) {

// 初期化関数
async function init() {
    if (!('speechSynthesis' in window)) {
        errorMessage.textContent = 'Your browser does not support Web Speech API. Please use Chrome, Edge, or Safari.';
        errorMessage.style.display = 'block';
        return;
    }
    loadVoices();
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
    loadStats();
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', () => selectDifficulty(btn.dataset.level));
    });
    repeatBtn.addEventListener('click', repeatAudio);
    backBtn.addEventListener('click', backToDifficulty);
    speedSlider.addEventListener('input', (e) => {
        speechRate = parseFloat(e.target.value);
        speedValue.textContent = speechRate.toFixed(1);
    });
    detailNumbersCheckbox.addEventListener('change', (e) => {
        includeDetailNumbers = e.target.checked;
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') {
            if (!repeatBtn.disabled) repeatAudio();
        } else if (e.key >= '1' && e.key <= '4') {
            const choices = document.querySelectorAll('.choice-btn');
            if (choices[parseInt(e.key) - 1] && !choices[parseInt(e.key) - 1].disabled) {
                choices[parseInt(e.key) - 1].click();
            }
        }
    });
    difficultySelect.style.display = 'flex';

    // 音声の読み込みを待つ
    if (typeof speechSynthesis !== 'undefined') {
        console.log('Waiting for voices to load...');
        await waitForVoices();
        console.log('Voices loaded successfully!');
        listAllVoices();
    }
}

// 音声読み込み
function loadVoices() { voices = synth.getVoices(); }

// 音声が読み込まれるまで待機する
function waitForVoices() {
    return new Promise((resolve) => {
        const voices = speechSynthesis.getVoices();
        if (voices.length > 0) {
            // すでに読み込まれている
            resolve(voices);
            return;
        }

        // まだ読み込まれていない場合、イベントを待つ
        speechSynthesis.onvoiceschanged = () => {
            const voices = speechSynthesis.getVoices();
            console.log('Voices loaded:', voices.length);
            resolve(voices);
        };

        // タイムアウト処理（10秒待っても読み込まれない場合）
        setTimeout(() => {
            const voices = speechSynthesis.getVoices();
            console.warn('Voice loading timeout. Available voices:', voices.length);
            resolve(voices);
        }, 10000);
    });
}

// 次の問題を取得（重複防止 + familiarity対応）
function getNextQuestion(difficulty, includeDetailNumbers, currentStreak) {
    let pool = questions[difficulty];

    // 細かい数字フィルタリング
    if (!includeDetailNumbers) {
        pool = pool.filter(q => !q.detailNumbers);
    }

    // 出題済み問題を除外
    pool = pool.filter(q => !askedQuestionIds.includes(q.id));

    // 全問題出題済みの場合、リセット
    if (pool.length === 0) {
        askedQuestionIds = [];
        pool = questions[difficulty];
        if (!includeDetailNumbers) {
            pool = pool.filter(q => !q.detailNumbers);
        }
    }

    // ランダムに1問選択
    const question = pool[Math.floor(Math.random() * pool.length)];
    askedQuestionIds.push(question.id);

    // 連続正解数に応じて適切な familiarity レベルの英文を選択
    const maxFamiliarity = getMaxFamiliarity(currentStreak);
    const availableVariations = question.variations.filter(v => v.familiarity <= maxFamiliarity);
    const selectedVariation = availableVariations[Math.floor(Math.random() * availableVariations.length)];

    return {
        ...question,
        text: selectedVariation.text  // 選ばれた英文を設定
    };
}

    // スライダーの値は既に設定されているので更新不要
    settingsArea.style.display = 'none';
    difficultySelect.style.display = 'none';
    questionArea.style.display = 'block';
    loadQuestion();
}

// 問題読み込み
function loadQuestion() {
    currentQuestion = getNextQuestion(currentLevel, includeDetailNumbers, currentStreak);
    isAnswered = false;
    questionText.textContent = 'Get ready...';
    explanationDiv.classList.remove('show');

    // 日本語表記設定の取得
    const useJapanese = document.getElementById('japaneseDisplay').checked;

    const shuffledChoices = [...currentQuestion.choices].sort(() => Math.random() - 0.5);
    choicesDiv.innerHTML = '';
    shuffledChoices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.dataset.originalValue = choice;  // Store original value
        btn.textContent = useJapanese ? convertToJapanese(choice) : choice;
        btn.addEventListener('click', () => checkAnswer(choice, btn));
        choicesDiv.appendChild(btn);
    });
    document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
    repeatBtn.disabled = true;
    setTimeout(() => { playAudio(); }, 1000);
}

// 音声再生（常に英語）
function playAudio() {
    if (!currentQuestion) return;

    // 音声が読み込まれているか確認
    const voices = speechSynthesis.getVoices();
    if (voices.length === 0) {
        console.warn('No voices available yet. Waiting...');
        // 音声を読み込んでから再試行
        waitForVoices().then(() => {
            playAudio();
        });
        return;
    }

    const utterance = new SpeechSynthesisUtterance(currentQuestion.text);
    utterance.lang = 'en-US';
    utterance.rate = speechRate;  // スライダーの値を使用（デフォルト1.2倍速）
    const randomVoice = getRandomVoice();
    if (randomVoice) utterance.voice = randomVoice;
    utterance.onstart = () => {
        repeatBtn.disabled = true;
        questionText.textContent = '🔊 Listening...';
    };
    utterance.onend = () => {
        repeatBtn.disabled = false;
        document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = false);
        questionText.textContent = 'Choose the correct answer:';
    };
    synth.speak(utterance);
}

// もう一度聞く
function repeatAudio() {
    if (!currentQuestion) return;

    const utterance = new SpeechSynthesisUtterance(currentQuestion.text);
    utterance.lang = 'en-US';
    utterance.rate = speechRate;  // スライダーの値を使用（デフォルト1.2倍速）
    const randomVoice = getRandomVoice();
    if (randomVoice) utterance.voice = randomVoice;
    utterance.onstart = () => {
        repeatBtn.disabled = true;
        questionText.textContent = '🔊 Listening...';
    };
    utterance.onend = () => {
        repeatBtn.disabled = false;
        questionText.textContent = 'Choose the correct answer:';
    };
    synth.speak(utterance);
}

// 正解の音声を再生（不正解時用、常に英語）
function playCorrectAnswerAudio(callback) {
    const utterance = new SpeechSynthesisUtterance(currentQuestion.correct);
    utterance.lang = 'en-US';
    utterance.rate = speechRate;  // スライダーの値を使用（デフォルト1.2倍速）
    const enVoice = voices.find(v => v.lang.includes('en-US') || v.lang.includes('en'));
    if (enVoice) utterance.voice = enVoice;
    utterance.onend = () => {
        if (callback) callback();
    };
    synth.speak(utterance);
}

// 回答チェック
function checkAnswer(selected, btn) {
    if (isAnswered) return;
    isAnswered = true;
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    if (selected === currentQuestion.correct) {
        btn.classList.add('correct');
        currentStreak++;
        updateStreak();
        playCorrectSound();
        setTimeout(() => { loadQuestion(); }, 500);
    } else {
        btn.classList.add('incorrect');
        currentStreak = 0;
        updateStreak();
        document.querySelectorAll('.choice-btn').forEach(b => {
            if (b.dataset.originalValue === currentQuestion.correct) b.classList.add('correct');
        });
        explanationText.innerHTML = currentQuestion.explanation;
        // 全レベルで英文表示
        explanationText.innerHTML += `<br>英文: "${currentQuestion.text}"`;
        // ヒントテキスト追加
        explanationText.innerHTML += '<br><br>(Click to next)';
        explanationDiv.classList.add('show');
        playIncorrectSound();

        // 不正解時に問題文を自動読み上げ
        const utterance = new SpeechSynthesisUtterance(currentQuestion.text);
        utterance.lang = 'en-US';
        utterance.rate = speechRate;
        const randomVoice = getRandomVoice();
        if (randomVoice) utterance.voice = randomVoice;
        synth.speak(utterance);

        // 説明エリアクリックで次の問題へ進む
        explanationDiv.onclick = () => {
            explanationDiv.onclick = null;  // イベントリスナー解除
            previousQuestion = currentQuestion;  // 前回の問題を保存
            loadQuestion();
        };
    }
}

// スコア更新
function updateStreak() {
    currentStreakDisplay.textContent = currentStreak;
    if (currentStreak > bestStreak) {
        bestStreak = currentStreak;
        bestStreakDisplay.textContent = bestStreak;
        saveStats();
    }
}

// 難易度選択に戻る
function backToDifficulty() {
    questionArea.style.display = 'none';
    settingsArea.style.display = 'block';
    difficultySelect.style.display = 'flex';
    currentLevel = null;
    currentQuestion = null;
}

window.addEventListener('load', init);
    </script>
</body>
</html>
